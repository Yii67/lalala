<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tool Feature Demo</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;margin:24px;background:#f7f9fc;color:#0b1320}
    .card{background:#fff;border-radius:8px;padding:18px;box-shadow:0 6px 18px rgba(11,19,32,.06);max-width:820px}
    textarea{width:100%;min-height:120px;padding:10px;border:1px solid #e6e9ef;border-radius:6px;resize:vertical}
    .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    select,input[type="text"]{padding:8px;border:1px solid #e6e9ef;border-radius:6px}
    button{background:#0b6cff;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
    button.secondary{background:#eef2ff;color:#0b1320;border:1px solid #d6e4ff}
    pre{background:#0b13202a;padding:12px;border-radius:6px;white-space:pre-wrap}
    .meta{font-size:13px;color:#5a6b7a;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h3>Tool Feature Demo</h3>
    <p class="meta">Enter text, choose an operation, and run the tool. This demo logs each run to an in-memory history you can download.</p>

    <label>Input</label>
    <textarea id="input">Hello, demo user! Type something here.</textarea>

    <div class="row" style="margin-top:12px">
      <label>Operation</label>
      <select id="op">
        <option value="uppercase">Uppercase</option>
        <option value="lowercase">Lowercase</option>
        <option value="reverse">Reverse</option>
        <option value="count">Character count</option>
        <option value="replace">Replace substring</option>
      </select>

      <input id="arg" type="text" placeholder="Optional arg (for replace: from=>to)" style="min-width:220px" />
      <button id="run">Run</button>
      <button id="copy" class="secondary">Copy Output</button>
      <button id="download" class="secondary">Download Log</button>
    </div>

    <h4 style="margin-top:14px">Output</h4>
    <pre id="output">—</pre>

    <div class="meta" id="historyMeta">Runs: 0</div>
  </div>

  <script>
    // Minimal demo logic + in-memory run log
    const inputEl = document.getElementById('input');
    const opEl = document.getElementById('op');
    const argEl = document.getElementById('arg');
    const outEl = document.getElementById('output');
    const runBtn = document.getElementById('run');
    const copyBtn = document.getElementById('copy');
    const downloadBtn = document.getElementById('download');
    const historyMeta = document.getElementById('historyMeta');

    let runs = [];

    function transform(text, op, arg) {
      if (!text) return '';
      switch(op) {
        case 'uppercase': return text.toUpperCase();
        case 'lowercase': return text.toLowerCase();
        case 'reverse': return text.split('').reverse().join('');
        case 'count': return 'Characters: ' + text.length;
        case 'replace': {
          // arg format: from=>to
          const parts = arg.split('=>');
          if (parts.length !== 2) return text;
          return text.split(parts[0]).join(parts[1]);
        }
        default: return text;
      }
    }

    function logRun(input, op, arg, result) {
      const entry = { time: new Date().toISOString(), op, arg, input, result };
      runs.push(entry);
      historyMeta.textContent = 'Runs: ' + runs.length;
    }

    runBtn.addEventListener('click', () => {
      const input = inputEl.value;
      const op = opEl.value;
      const arg = argEl.value || '';
      const result = transform(input, op, arg);
      outEl.textContent = result;
      logRun(input, op, arg, result);
    });

    copyBtn.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(outEl.textContent); copyBtn.textContent = 'Copied'; setTimeout(()=>copyBtn.textContent='Copy Output',900); }
      catch(e){ alert('Clipboard not available'); }
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(runs, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tool-demo-log.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    // Small usability: handle Enter in arg to run
    argEl.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ runBtn.click(); e.preventDefault(); }});
  </script>
</body>
</html>
